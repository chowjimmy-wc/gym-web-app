<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymApp — 60天增肌計劃</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div>
      <h1>GymApp</h1>
      <div class="subtitle">60天 Lean Bulk 訓練與飲食指南</div>
    </div>
    <div class="day-badge" id="header-day">Day 1</div>
  </header>

  <nav class="tabs">
    <button class="active" data-tab="today">今日總覽</button>
    <button data-tab="workout">訓練指南</button>
    <button data-tab="meals">飲食餐單</button>
    <button data-tab="calendar">60天日曆</button>
    <button data-tab="progress">進度追蹤</button>
    <button data-tab="planner">計劃設計</button>
    <button data-tab="nutrition">營養目標</button>
    <button data-tab="manage">資料管理</button>
  </nav>

  <main>
    <!-- Today -->
    <section class="panel active" id="panel-today">
      <div class="controls">
        <button class="btn secondary" id="btn-prev">← 前一天</button>
        <button class="btn secondary" id="btn-next">後一天 →</button>
        <button class="btn" id="btn-complete-day">標記今日完成</button>
      </div>
      <div class="card">
        <h2 id="today-title">Day 1 — 第 1 週 星期一</h2>
        <p class="muted" id="today-type"></p>
        <div class="progress-bar"><div class="fill" id="today-progress" style="width:0%"></div></div>
        <p class="muted" id="today-progress-text" style="margin-top:0.5rem"></p>
      </div>
      <div class="grid-2" id="today-stats"></div>
      <div class="card">
        <h2>今日訓練摘要</h2>
        <div id="today-workout-summary"></div>
      </div>
      <div class="card">
        <h2>今日飲食摘要</h2>
        <div id="today-meal-summary"></div>
      </div>
    </section>

    <!-- Workout -->
    <section class="panel" id="panel-workout">
      <div class="card">
        <h2 id="workout-title">訓練</h2>
        <p class="muted" id="workout-rest-hint"></p>
      </div>
      <div id="workout-exercises"></div>
      <div class="card">
        <h3>備註</h3>
        <textarea id="workout-notes" placeholder="記錄今日訓練感受、重量等..."></textarea>
        <button class="btn" style="margin-top:0.5rem" id="btn-save-notes">儲存備註</button>
      </div>
    </section>

    <!-- Meals -->
    <section class="panel" id="panel-meals">
      <div class="card">
        <h2 id="meals-title">今日餐單</h2>
      </div>
      <div id="meals-list"></div>
    </section>

    <!-- Calendar -->
    <section class="panel" id="panel-calendar">
      <div class="card">
        <h2>60天計劃一覽</h2>
        <p class="muted">點擊任一天查看詳情。綠色 = 已完成。</p>
        <div class="controls" style="margin-top:0.75rem">
          <label>計劃開始日期：</label>
          <input type="date" id="start-date">
          <button class="btn secondary" id="btn-save-start">儲存</button>
        </div>
        <p class="muted" id="calendar-hint" style="margin-top:0.5rem"></p>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <!-- Progress -->
    <section class="panel" id="panel-progress">
      <div class="card">
        <h2>每週進度追蹤</h2>
        <p class="muted">對應 Excel「進度追蹤與檢討」工作表</p>
      </div>
      <div id="weekly-forms"></div>
    </section>

    <!-- Planner -->
    <section class="panel" id="panel-planner">
      <div class="card">
        <h2>自訂訓練計劃</h2>
        <p class="muted">修改某天的動作與組數，儲存後寫入計劃資料。</p>
        <div class="controls" style="margin-top:0.75rem">
          <label>選擇天數：</label>
          <select id="planner-day-select"></select>
          <button class="btn" id="btn-save-plan">儲存自訂計劃</button>
          <button class="btn secondary" id="btn-reset-plan">重新載入</button>
        </div>
      </div>
      <div class="card">
        <div class="form-row">
          <label>訓練類型</label>
          <input type="text" id="planner-type" style="width:100%">
        </div>
        <div class="form-row">
          <label>休息時間建議</label>
          <input type="text" id="planner-rest" style="width:100%">
        </div>
        <h3 style="margin:1rem 0 0.5rem">動作列表</h3>
        <div id="planner-exercises"></div>
        <button class="btn secondary" id="btn-add-exercise" style="margin-top:0.5rem">+ 新增動作</button>
      </div>
    </section>

    <!-- Nutrition -->
    <section class="panel" id="panel-nutrition">
      <div class="card">
        <h2>營養與熱量目標</h2>
        <p class="muted">每日飲食請以此為參考基準</p>
      </div>
      <div class="grid-2" id="nutrition-grid"></div>
    </section>

    <!-- Data Management -->
    <section class="panel" id="panel-manage">
      <div class="card">
        <h2>計劃設定</h2>
        <div class="form-row">
          <label>計劃名稱</label>
          <input type="text" id="plan-title" style="width:100%">
        </div>
        <button class="btn" id="btn-save-title">儲存計劃名稱</button>
      </div>

      <div class="card">
        <h2>從 Excel 匯入</h2>
        <p class="muted">支援與範例檔相同格式（營養、課表、餐單、進度追蹤等工作表）</p>
        <div class="controls" style="margin-top:0.75rem">
          <input type="file" id="import-file" accept=".xlsx,.xls">
          <select id="import-mode">
            <option value="replace">取代現有資料</option>
            <option value="merge">合併至現有資料</option>
          </select>
          <button class="btn" id="btn-import">匯入 Excel</button>
        </div>
        <p class="muted" id="import-status" style="margin-top:0.5rem"></p>
      </div>

      <nav class="sub-tabs">
        <button class="active" data-manage="workouts">訓練課表</button>
        <button data-manage="meals">飲食餐單</button>
        <button data-manage="nutrition">營養目標</button>
      </nav>

      <div class="card">
        <div class="controls">
          <input type="text" id="manage-search" placeholder="搜尋關鍵字..." style="flex:1;min-width:160px">
          <input type="number" id="manage-day-filter" placeholder="Day #" min="1" style="width:90px">
          <button class="btn secondary" id="btn-manage-search">查詢</button>
          <button class="btn" id="btn-manage-add">+ 新增</button>
        </div>
        <div id="manage-list"></div>
      </div>

      <div class="card" id="manage-editor" style="display:none">
        <h2 id="manage-editor-title">編輯</h2>
        <div id="manage-form"></div>
        <div class="controls" style="margin-top:0.75rem">
          <button class="btn" id="btn-manage-save">儲存</button>
          <button class="btn secondary" id="btn-manage-cancel">取消</button>
          <button class="btn secondary" id="btn-manage-delete" style="color:var(--danger);border-color:var(--danger)">刪除</button>
        </div>
      </div>
    </section>
  </main>

  <toast id="toast">已儲存</toast>
  <script src="/app.js"></script>
  <script src="/manage.js"></script>
</body>
</html>
