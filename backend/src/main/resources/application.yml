spring:
  application:
    name: gymapp-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gymapp}
    username: ${DB_USERNAME:gymapp}
    password: ${DB_PASSWORD:gymapp}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-secret-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
