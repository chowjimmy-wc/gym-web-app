spring:
  application:
    name: gymapp-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gymapp}
    username: ${DB_USERNAME:gymapp}
    password: ${DB_PASSWORD:gymapp}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  # Local default is 8090 because 8080 is commonly occupied on the dev machine.
  # In Docker, docker-compose sets SERVER_PORT=8080 to match the container port mapping.
  port: ${SERVER_PORT:8090}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-secret-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
