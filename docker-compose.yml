services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gymapp
      POSTGRES_USER: gymapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gymapp}
    volumes:
      - gymapp-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymapp -d gymapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/gymapp
      DB_USERNAME: gymapp
      DB_PASSWORD: ${DB_PASSWORD:-gymapp}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-secret-must-be-at-least-256-bits-long}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Must be reachable from the user's browser, not from inside Docker
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  gymapp-db-data:
